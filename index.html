<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Volumetric Simulator | Hydrogen</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="loading-screen">
        <h2 style="margin-bottom: 20px; font-size: 24px;">Orbital Density</h2>
        <p style="margin-bottom: 15px; color: #888;">Sintetizando Malha de Probabilidade...</p>
        <div id="loading-bar-container">
            <div id="loading-bar"></div>
        </div>
        <p id="loading-text" style="margin-top: 15px; font-weight: bold;">0%</p>
    </div>
    
    <button id="toggle-panel" style="position: absolute; top: 10px; right: 10px; z-index: 1000; background: #00aaff; color: #000; border: none; padding: 10px; border-radius: 4px; font-weight: bold; cursor: pointer;">☰ Controles</button>

    <div id="quantum-panel">
        <h3>Controle de Estado</h3>
        <div class="input-group">
            <label for="input-n">Principal (n):</label>
            <input type="range" id="input-n" value="1" min="1" max="4" step="1" oninput="document.getElementById('val-n').innerText = this.value">
            <span id="val-n" style="width: 20px; text-align: right;">1</span>
        </div>
        <div class="input-group">
            <label for="input-l">Angular (l):</label>
            <input type="range" id="input-l" value="0" min="0" max="3" step="1" oninput="document.getElementById('val-l').innerText = this.value; updateMagOptions();">
            <span id="val-l" style="width: 20px; text-align: right;">0</span>
        </div>
        <div class="input-group">
            <label for="input-m">Magnético (m):</label>
            <select id="input-m" style="width: 60px; background: #111; color: #00aaff; border: 1px solid #555; border-radius: 4px; padding: 4px; text-align: center; font-weight: bold;">
                <option value="0">0</option>
            </select>
        </div>
        <div class="input-group">
            <label for="input-spin">Spin (m<sub>s</sub>):</label>
            <select id="input-spin" style="width: 70px; background: #111; color: #00aaff; border: 1px solid #555; border-radius: 4px; padding: 4px; text-align: center; font-weight: bold;">
                <option value="1">+1/2</option>
                <option value="-1">-1/2</option>
            </select>
        </div>

        <h3 style="margin-top: 20px;">Performance</h3>
        <div class="input-group" style="flex-direction: column; align-items: flex-start;">
            <label for="input-particles" style="margin-bottom: 5px;">Densidade: <span id="val-particles">0.1</span> Milhões</label>
            <input type="range" id="input-particles" value="1" min="1" max="100" step="1" style="width: 100%;" oninput="document.getElementById('val-particles').innerText = (this.value * 0.1).toFixed(1)">
        </div>

        <button id="btn-update">Aplicar Física</button>
        <p id="error-msg" style="margin-top: 15px; font-size: 14px; text-align: center; font-weight: bold;"></p>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="script.js"></script>
</body>
</html>
